name: Deploy URL Bookmark Saver

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-url-bookmark-saver.yml'
      - 'projects/03-url-bookmark-saver/**'
  pull_request:
    paths:
      - '.github/workflows/deploy-url-bookmark-saver.yml'
      - 'projects/03-url-bookmark-saver/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_DIR: projects/03-url-bookmark-saver
  AWS_REGION: ${{ vars.URL_BOOKMARK_SAVER_AWS_REGION || 'us-east-1' }}
  STUDENT_NAME: ${{ vars.URL_BOOKMARK_SAVER_STUDENT_NAME }}

jobs:
  validate:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            projects/03-url-bookmark-saver/backend/package-lock.json
            projects/03-url-bookmark-saver/frontend/package-lock.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install backend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: npm ci --omit=dev

      - name: Check Lambda syntax
        working-directory: ${{ env.PROJECT_DIR }}/backend
        run: node --check src/handler.js

      - name: Install frontend dependencies
        working-directory: ${{ env.PROJECT_DIR }}/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.PROJECT_DIR }}/frontend
        env:
          NEXT_PUBLIC_API_URL: https://example.execute-api.us-east-1.amazonaws.com
        run: npm run build

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive $PROJECT_DIR/terraform

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            projects/03-url-bookmark-saver/backend/package-lock.json
            projects/03-url-bookmark-saver/frontend/package-lock.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials with OIDC
        if: vars.URL_BOOKMARK_SAVER_AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.URL_BOOKMARK_SAVER_AWS_ROLE_ARN }}
          role-session-name: github-actions-stash-deploy

      - name: Configure AWS credentials with access keys
        if: vars.URL_BOOKMARK_SAVER_AWS_ROLE_ARN == '' && secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Validate deployment settings
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${STUDENT_NAME}" ]; then
            echo "Set repository variable URL_BOOKMARK_SAVER_STUDENT_NAME before deploying." >&2
            exit 1
          fi

          if [ -z "${{ vars.URL_BOOKMARK_SAVER_AWS_ROLE_ARN }}" ] && { [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; }; then
            echo "Provide either URL_BOOKMARK_SAVER_AWS_ROLE_ARN or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY." >&2
            exit 1
          fi

          aws sts get-caller-identity >/dev/null

      - name: Deploy application
        working-directory: ${{ env.PROJECT_DIR }}
        env:
          CI: true
          AWS_REGION: ${{ env.AWS_REGION }}
          STUDENT_NAME: ${{ env.STUDENT_NAME }}
          SEED_DEMO_DATA: ${{ vars.URL_BOOKMARK_SAVER_SEED_DEMO_DATA || 'true' }}
          DEMO_SEED_COUNT: ${{ vars.URL_BOOKMARK_SAVER_DEMO_SEED_COUNT || '18' }}
        run: bash scripts/deploy.sh --name "$STUDENT_NAME" --region "$AWS_REGION"

      - name: Publish deployment summary
        working-directory: ${{ env.PROJECT_DIR }}/terraform
        shell: bash
        run: |
          {
            echo "## URL Bookmark Saver Deployment"
            echo ""
            echo "- Region: ${AWS_REGION}"
            echo "- Student name: ${STUDENT_NAME}"
            echo "- Frontend: $(terraform output -raw frontend_url)"
            echo "- API: $(terraform output -raw api_url)"
            echo "- Dashboard: $(terraform output -raw dashboard_url)"
          } >> "$GITHUB_STEP_SUMMARY"
